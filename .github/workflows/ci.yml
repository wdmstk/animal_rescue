name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres
  NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
  NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy
  SUPABASE_SERVICE_ROLE_KEY: dummy
  NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000

jobs:
  pr-operational-guard:
    name: PR Operational Guard
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate branch naming
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          if [[ -z "${BRANCH_NAME}" ]]; then
            echo "head_ref is empty."
            exit 1
          fi

          if [[ ! "${BRANCH_NAME}" =~ ^(feat|fix|refactor|test|docs|chore)/TASK-[0-9]+-[a-z0-9-]+$ ]]; then
            echo "Invalid branch format: ${BRANCH_NAME}"
            echo "Expected: <type>/TASK-<id>-<short-description>"
            exit 1
          fi

      - name: Validate PR checklist
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [[ -z "${PR_BODY}" ]]; then
            echo "PR body is empty. Use pull request template and complete checklist."
            exit 1
          fi

          required_items=(
            "task_updated"
            "task_order_checked"
            "issue_created_and_linked"
            "issue_split_for_parallelizable_units"
            "issue_closed_on_task_done"
            "branch_naming_checked"
            "tests_run_lint"
            "tests_run_vitest"
            "tests_run_e2e_or_na"
            "ci_green_confirmed"
            "self_review_done"
            "ready_for_main_merge"
          )

          missing=0
          for item in "${required_items[@]}"; do
            if ! printf '%s\n' "${PR_BODY}" | grep -Eiq -- "- \[[xX]\] ${item}"; then
              echo "Checklist item is not checked: ${item}"
              missing=1
            fi
          done

          if [[ "${missing}" -ne 0 ]]; then
            echo "Please complete all required checklist items in PR body."
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  test:
    name: Unit/Integration (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit/integration tests
        run: npx vitest run

  db-integration:
    name: DB Integration (Real Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: animal_rescue_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d animal_rescue_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/animal_rescue_test
      RUN_DB_INTEGRATION: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Run real DB integration test
        run: npx vitest run tests/integration/health-db-real-route.test.ts

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
