name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review
  push:
    branches:
      - main

permissions:
  contents: read
  checks: read
  pull-requests: read
  issues: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres
  NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
  NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy
  SUPABASE_SERVICE_ROLE_KEY: dummy
  NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000

jobs:
  pr-operational-guard:
    name: PR Operational Guard
    if: github.event_name == 'pull_request' && contains(fromJSON('["opened","synchronize","reopened","edited","ready_for_review"]'), github.event.action)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate branch naming
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          if [[ -z "${BRANCH_NAME}" ]]; then
            echo "head_ref is empty."
            exit 1
          fi

          if [[ ! "${BRANCH_NAME}" =~ ^(feat|fix|refactor|test|docs|chore)/TASK-[0-9]+-[a-z0-9-]+$ ]]; then
            echo "Invalid branch format: ${BRANCH_NAME}"
            echo "Expected: <type>/TASK-<id>-<short-description>"
            exit 1
          fi

      - name: Validate PR checklist
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [[ -z "${PR_BODY}" ]]; then
            echo "PR body is empty. Use pull request template and complete checklist."
            exit 1
          fi

          required_items=(
            "task_updated"
            "task_order_checked"
            "issue_created_and_linked"
            "issue_split_for_parallelizable_units"
            "branch_naming_checked"
            "tests_run_lint"
            "tests_run_vitest"
            "tests_run_e2e_or_na"
            "self_review_initial_done_before_pr"
            "pr_opened_ready_for_review_or_reason_for_draft"
          )

          missing=0
          for item in "${required_items[@]}"; do
            if ! printf '%s\n' "${PR_BODY}" | grep -Eiq -- "- \[[xX]\] ${item}"; then
              echo "Checklist item is not checked: ${item}"
              missing=1
            fi
          done

          if [[ "${missing}" -ne 0 ]]; then
            echo "Please complete all required checklist items in PR body."
            exit 1
          fi

  pr-pre-merge-guard:
    name: PR Pre-Merge Guard
    if: github.event_name == 'pull_request' && github.event.action == 'edited'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Detect pre-merge validation phase
        id: premerge_phase
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [[ -z "${PR_BODY}" ]]; then
            echo "should_validate=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s\n' "${PR_BODY}" | grep -Eiq -- "- \[[xX]\] (ci_green_confirmed|self_review_final_done_after_ci_green|ready_for_main_merge)"; then
            echo "should_validate=true" >> "$GITHUB_OUTPUT"
          else
            echo "Pre-merge checklist is not checked yet. Skip pre-merge guard in this edited event."
            echo "should_validate=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate pre-merge checklist
        if: steps.premerge_phase.outputs.should_validate == 'true'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [[ -z "${PR_BODY}" ]]; then
            echo "PR body is empty. Use pull request template and complete checklist."
            exit 1
          fi

          required_items=(
            "ci_green_confirmed"
            "self_review_final_done_after_ci_green"
            "ready_for_main_merge"
          )

          missing=0
          for item in "${required_items[@]}"; do
            if ! printf '%s\n' "${PR_BODY}" | grep -Eiq -- "- \[[xX]\] ${item}"; then
              echo "Checklist item is not checked: ${item}"
              missing=1
            fi
          done

          if [[ "${missing}" -ne 0 ]]; then
            echo "Please complete all required pre-merge checklist items in PR body."
            exit 1
          fi

      - name: Validate final self-review notes
        if: steps.premerge_phase.outputs.should_validate == 'true'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [[ -z "${PR_BODY}" ]]; then
            echo "PR body is empty. Use pull request template and complete checklist."
            exit 1
          fi

          required_self_review_lines=(
            "- 差分妥当性:"
            "- 不要変更混入:"
            "- 残リスク/フォローアップ:"
          )

          missing=0
          for line in "${required_self_review_lines[@]}"; do
            if ! printf '%s\n' "${PR_BODY}" | grep -Fqi -- "${line}"; then
              echo "Final self-review note is missing: ${line}"
              missing=1
            fi
          done

          if [[ "${missing}" -ne 0 ]]; then
            echo "Please complete all required final self-review note lines in PR body."
            exit 1
          fi

      - name: Validate required CI checks on head SHA
        if: steps.premerge_phase.outputs.should_validate == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const requiredChecks = [
              "Lint",
              "Unit/Integration (Vitest)",
              "DB Integration (Real Postgres)",
              "E2E (Playwright)"
            ];

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.payload.pull_request.head.sha;

            const checksResponse = await github.rest.checks.listForRef({
              owner,
              repo,
              ref,
              per_page: 100
            });

            const failures = [];
            for (const name of requiredChecks) {
              const sameNameChecks = checksResponse.data.check_runs.filter((check) => check.name === name);
              if (sameNameChecks.length === 0) {
                failures.push(`${name}: check run not found`);
                continue;
              }

              const hasSuccess = sameNameChecks.some(
                (check) => check.status === "completed" && check.conclusion === "success"
              );

              if (!hasSuccess) {
                const latest = sameNameChecks.sort((a, b) => b.id - a.id)[0];
                failures.push(`${name}: status=${latest.status}, conclusion=${latest.conclusion}`);
              }
            }

            if (failures.length > 0) {
              core.setFailed(
                [
                  "Required CI checks are not all green for this PR head SHA.",
                  ...failures.map((line) => `- ${line}`)
                ].join("\n")
              );
            }

  post-merge-issue-guard:
    name: Post-Merge Issue Guard
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate merged PR post-merge checklist and linked issue state
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const commitSha = context.sha;

            const associated = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: commitSha,
              per_page: 100
            });

            const mergedPr = associated.data.find((pr) => pr.base?.ref === "main" && pr.merged_at);
            if (!mergedPr) {
              core.info("No merged PR associated with this main push commit. Skip post-merge validation.");
              return;
            }

            const body = mergedPr.body ?? "";
            if (!/- \[[xX]\] issue_closed_on_task_done/i.test(body)) {
              core.setFailed(
                `Merged PR #${mergedPr.number} is missing checked item: issue_closed_on_task_done`
              );
              return;
            }

            const issueMatch = body.match(/- 対応Issue:\s*#(\d+)/i);
            if (!issueMatch) {
              core.setFailed(`Merged PR #${mergedPr.number} is missing 対応Issue in PR body.`);
              return;
            }

            const issueNumber = Number(issueMatch[1]);
            const issue = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber
            });

            if (issue.data.state !== "closed") {
              core.setFailed(
                `Linked issue #${issueNumber} is not closed after merge (state=${issue.data.state}).`
              );
            }

  lint:
    name: Lint
    if: github.event_name != 'pull_request' || contains(fromJSON('["opened","synchronize","reopened","ready_for_review"]'), github.event.action)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  test:
    name: Unit/Integration (Vitest)
    if: github.event_name != 'pull_request' || contains(fromJSON('["opened","synchronize","reopened","ready_for_review"]'), github.event.action)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit/integration tests
        run: npx vitest run

  db-integration:
    name: DB Integration (Real Postgres)
    if: github.event_name != 'pull_request' || contains(fromJSON('["opened","synchronize","reopened","ready_for_review"]'), github.event.action)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: animal_rescue_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d animal_rescue_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/animal_rescue_test
      RUN_DB_INTEGRATION: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Run real DB integration test
        run: npx vitest run tests/integration/health-db-real-route.test.ts

  e2e:
    name: E2E (Playwright)
    if: github.event_name != 'pull_request' || contains(fromJSON('["opened","synchronize","reopened","ready_for_review"]'), github.event.action)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
