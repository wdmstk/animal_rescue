name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review
  push:
    branches:
      - main

permissions:
  contents: read
  checks: read
  pull-requests: read
  issues: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres
  NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
  NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy
  SUPABASE_SERVICE_ROLE_KEY: dummy
  NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000

jobs:
  pr-operational-guard:
    name: PR Operational Guard
    if: github.event_name == 'pull_request' && contains(fromJSON('["opened","synchronize","reopened","edited","ready_for_review"]'), github.event.action)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate branch naming
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          if [[ -z "${BRANCH_NAME}" ]]; then
            echo "head_ref is empty."
            exit 1
          fi

          if [[ ! "${BRANCH_NAME}" =~ ^(feat|fix|refactor|test|docs|chore)/TASK-[0-9]+-[a-z0-9-]+$ ]]; then
            echo "Invalid branch format: ${BRANCH_NAME}"
            echo "Expected: <type>/TASK-<id>-<short-description>"
            exit 1
          fi

  post-merge-issue-guard:
    name: Post-Merge Issue Guard
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate merged PR post-merge checklist and linked issue state
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const commitSha = context.sha;

            const associated = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: commitSha,
              per_page: 100
            });

            const mergedPr = associated.data.find((pr) => pr.base?.ref === "main" && pr.merged_at);
            if (!mergedPr) {
              core.info("No merged PR associated with this main push commit. Skip post-merge validation.");
              return;
            }

            const body = mergedPr.body ?? "";
            const issueMatch = body.match(/- 対応Issue:\s*#(\d+)/i);
            if (!issueMatch) {
              core.info(`Merged PR #${mergedPr.number} has no linked issue. Skip issue validation.`);
              return;
            }

            const issueNumber = Number(issueMatch[1]);
            const issue = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber
            });

            if (issue.data.state !== "closed") {
              core.setFailed(
                `Linked issue #${issueNumber} is not closed after merge (state=${issue.data.state}).`
              );
            }

  lint:
    name: Lint
    if: github.event_name != 'pull_request' || contains(fromJSON('["opened","synchronize","reopened","ready_for_review"]'), github.event.action)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  test:
    name: Unit/Integration (Vitest)
    if: github.event_name != 'pull_request' || contains(fromJSON('["opened","synchronize","reopened","ready_for_review"]'), github.event.action)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit/integration tests
        run: npx vitest run

  db-integration:
    name: DB Integration (Real Postgres)
    if: github.event_name != 'pull_request' || contains(fromJSON('["opened","synchronize","reopened","ready_for_review"]'), github.event.action)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: animal_rescue_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d animal_rescue_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/animal_rescue_test
      RUN_DB_INTEGRATION: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Run real DB integration test
        run: npx vitest run tests/integration/health-db-real-route.test.ts

  e2e:
    name: E2E (Playwright)
    if: github.event_name != 'pull_request' || contains(fromJSON('["opened","synchronize","reopened","ready_for_review"]'), github.event.action)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
